---
- name: Prepare all containers
  hosts: containers
  become: yes
  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: yes
        upgrade: yes

    - name: Install docker Python library (required for ansible docker modules)
      apt:
        name: python3-docker
        state: present

    - name: Ensure docker metrics endpoint for prometheus is configured and exposed
      ansible.builtin.lineinfile:
        path: /etc/docker/daemon.json
        line: "{ \"metrics-addr\": \"0.0.0.0:9323\" }"
        state: present
        create: true

    - name: Ensure docker service is restarted after config change
      ansible.builtin.service:
        name: docker
        state: restarted

- name: Deploy Forgejo
  hosts: forgejo
  become: yes
  tasks:
    - name: Create certs directory
      file:
        path: /etc/forgejo/certs
        state: directory
        mode: '0755'
        owner: '1000'
        group: '1000'

    - name: Copy TLS certificate
      copy:
        src: forgejo/forgejo.crt
        dest: /etc/forgejo/certs/forgejo.crt
        mode: '0644'
        owner: '1000'
        group: '1000'

    - name: Copy TLS private key
      copy:
        src: forgejo/forgejo.key
        dest: /etc/forgejo/certs/forgejo.key
        mode: '0600'
        owner: '1000'
        group: '1000'

    - name: Create Forgejo data volume
      community.docker.docker_volume:
        name: forgejo_data

    - name: Run Forgejo container
      community.docker.docker_container:
        name: forgejo
        image: codeberg.org/forgejo/forgejo:10
        state: started
        restart_policy: unless-stopped
        ports:
          - "443:3000"
          - "2222:22"
        env:
          FORGEJO__server__PROTOCOL: "https"
          FORGEJO__server__HTTP_PORT: "3000"
          FORGEJO__server__DOMAIN: "forgejo.grumples.home"
          FORGEJO__server__ROOT_URL: "https://forgejo.grumples.home"
          FORGEJO__server__CERT_FILE: "/certs/forgejo.crt"
          FORGEJO__server__KEY_FILE: "/certs/forgejo.key"
          FORGEJO__server__SSH_DOMAIN: "forgejo.grumples.home"
          FORGEJO__server__SSH_PORT: "2222"
          FORGEJO__server__START_SSH_SERVER: "true"
          FORGEJO__database__DB_TYPE: "sqlite3"
        volumes:
          - forgejo_data:/data
          - /etc/forgejo/certs:/certs:ro
