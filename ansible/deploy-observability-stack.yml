---
- name: Prepare all containers
  hosts: containers
  become: yes
  tasks:
    - name: Update and upgrade apt packages
      apt:
        update_cache: yes
        upgrade: yes
    - name: Install docker Python library (required for ansible docker modules)
      apt:
        name: python3-docker
        state: present
    - name: Ensure docker metrics endpoint for prometheus is configured and exposed
      ansible.builtin.lineinfile:
        path: /etc/docker/daemon.json
        line: "{ \"metrics-addr\": \"0.0.0.0:9323\" }"
        state: present
        create: true
    - name: Ensure docker service is restarted after config change
      ansible.builtin.service:
        name: docker
        state: restarted

- name: Deploy Prometheus
  hosts: prometheus
  become: yes
  tasks:
    - name: Ensure prometheus directory exists
      ansible.builtin.file:
        path: ~/prometheus/
        state: directory
    - name: Copy prometheus.yml file
      template:
        src: prometheus/prometheus.yml.j2
        dest: ~/prometheus/prometheus.yml
    - name: Run prometheus container
      community.docker.docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "9090:9090"
        volumes:
          - open-webui:/app/backend/data
          - ~/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

- name: Deploy Grafana
  hosts: grafana
  become: yes
  tasks:
    - name: Ensure Grafana provisioning directory exists
      ansible.builtin.file:
        path: ~/grafana/provisioning/datasources
        state: directory

    - name: Copy datasource provisioning config
      template:
        src: grafana/datasources.yml.j2
        dest: ~/grafana/provisioning/datasources/datasources.yml

    - name: Run Grafana container
      community.docker.docker_container:
        name: grafana
        image: grafana/grafana:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "80:3000"
        volumes:
          - grafana-data:/var/lib/grafana
          - ~/grafana/provisioning:/etc/grafana/provisioning:ro
