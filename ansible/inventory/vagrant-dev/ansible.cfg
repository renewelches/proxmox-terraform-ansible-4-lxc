[ssh_connection]
# StrictHostKeyChecking=no  — Auto-accept unknown host keys without prompting.
#                             Safe for local Vagrant VMs that get recreated frequently with new keys.
# IdentitiesOnly=yes        — Only use the key explicitly provided (via ansible_ssh_private_key_file),
#                             ignoring any keys loaded in ssh-agent. Prevents auth failures when the
#                             agent offers keys the VM doesn't recognize.
ssh_args = -o StrictHostKeyChecking=no -o IdentitiesOnly=yes
